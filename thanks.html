<style>
  .thanks-wrap{
    min-height: 100vh; display:flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(900px 600px at 50% -10%, #143560 0%, #0A2540 60%, #07182C 100%);
    color: #fff; text-align: center;
  }
  .thanks-card{
    max-width: 560px; width: 100%;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.12);
    border-radius: 24px; padding: 56px 36px;
    backdrop-filter: blur(8px);
  }
  .thanks-check{
    width: 88px; height: 88px; border-radius: 50%;
    background: var(--gold); color: var(--navy);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 44px; font-weight: 900;
    margin: 0 auto 28px;
    box-shadow: 0 14px 36px -8px rgba(197,165,114,.6);
  }
  .thanks-card h1{
    font-size: clamp(28px, 4vw, 40px); font-weight: 900; letter-spacing: -.02em;
    margin: 0 0 16px; line-height: 1.3;
  }
  .thanks-card h1 strong{ color: var(--gold); }
  .thanks-card p{
    color: #C9D3E2; font-size: 16px; line-height: 1.8; margin: 0 0 14px;
  }
  .thanks-info{
    background: rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.08);
    border-radius: 14px; padding: 22px;
    margin: 28px 0;
    text-align: left; font-size: 14.5px; color: #E0E6EF; line-height: 1.8;
  }
  .thanks-info strong{ color: var(--gold); }
  .thanks-cta{ display:flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
</style>
</head>

<body>
<main class="thanks-wrap">
  <div class="thanks-card">
    <div class="thanks-check" aria-hidden="true">✓</div>
    <h1>신청이 정상적으로<br/><strong>접수되었습니다.</strong></h1>
    <p>대표님의 소중한 시간, 헛되지 않게 준비하겠습니다.</p>

    <div class="thanks-info">
      <p style="margin:0 0 8px;"><strong>다음 단계 안내</strong></p>
      <p style="margin:0;">
        · 영업일 기준 <strong>24시간 내</strong>에 담당 컨설턴트가 연락드립니다.<br/>
        · 진단 일정은 비대면(화상) 또는 대면 중 편하신 방법으로 잡아드립니다.<br/>
        · 추가 문의: <a href="mailto:ceo@biznaeil.com" style="color:var(--gold)">ceo@biznaeil.com</a>
      </p>
    </div>

    <div class="thanks-cta">
      <a href="index.html" class="btn btn-gold btn-lg">홈으로 가기</a>
      <a href="index.html#services" class="btn btn-ghost btn-lg" style="color:#fff;border-color:rgba(255,255,255,.3);">서비스 더 보기</a>
    </div>
  </div>
</main>
</body>
